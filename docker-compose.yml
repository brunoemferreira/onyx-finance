version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: web-finance-postgres
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web-finance
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
